<div class="home-page px-6 py-10 bg-background text-text min-h-screen">
  <!-- Hero -->
  <section class="text-center mb-12">
    <h1 class="text-3xl md:text-5xl font-extrabold text-button">Bienvenue sur SeriesTime 🎬</h1>
    <p class="text-gray-300 mt-3 text-lg">
      Découvrez les meilleures séries, suivez vos préférées et ne manquez aucune sortie.
    </p>
  </section>

  <!-- Séries populaires -->
  <section>
    <h2 class="text-2xl font-bold mb-6">Séries populaires</h2>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6">
      @for (serie of series(); track serie.id) {
        <div class="bg-container rounded-lg shadow-lg overflow-hidden hover:scale-105 transition-transform cursor-pointer">
          <a [routerLink]="['/series', serie.id]">
            <img [src]="serie.poster || 'assets/img/no-poster.png'"
                 alt="{{ serie.name }}"
                 class="w-full h-60 object-cover" />
            <div class="p-3">
              <h3 class="text-sm font-semibold truncate">{{ serie.name }}</h3>
              <p class="text-xs text-gray-400">{{ serie.firstAirDate | date:'yyyy' }}</p>
            </div>
          </a>
        </div>
      }
    </div>

    <div class="mt-6 text-center">
      <a routerLink="/series/liste"
         class="px-5 py-2 bg-button text-white rounded-full hover:opacity-90 transition">
        Voir toutes les séries
      </a>
    </div>
  </section>
</div>
