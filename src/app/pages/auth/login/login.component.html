<div class="min-h-screen flex items-center justify-center relative py-4 bg-cover bg-center"
     style="background-image: url('/assets/images/fond-serie.jpeg');">

  <div class="container relative z-10 max-w-md w-full">
    <div class="card auth-card bg-dark text-light border-0 shadow-lg">
      <div class="card-body p-6">

        <!-- Icône / titre -->
        <div class="text-center mb-4">
          <div class="auth-icon rounded-circle mb-3 mx-auto flex items-center justify-center">
            <fa-icon [icon]="['fas','user']" class="text-primary text-2xl"></fa-icon>
          </div>
          <h1 class="h3 font-bold text-white mb-2">Connexion</h1>
          <p class="text-light opacity-75">Accédez à votre espace</p>
        </div>

        <!-- Erreur -->
        @if (errorMessage) {
          <div class="alert alert-danger custom-alert d-flex items-center mb-4">
            <fa-icon [icon]="['fas','triangle-exclamation']" class="me-2"></fa-icon>
            <small>{{ errorMessage }}</small>
          </div>
        }

        <!-- Formulaire -->
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <!-- Email -->
          <div class="mb-3 input-icon">
            <label for="email" class="form-label text-light small fw-medium">Adresse email</label>
            <fa-icon [icon]="['fas','envelope']" class="input-icon-left text-gray-400"></fa-icon>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="votre@email.com"
              class="form-control custom-form-control ps-5"
              required
            />
          </div>

          <!-- Mot de passe -->
          <div class="mb-3 input-icon">
            <label for="password" class="form-label text-light small fw-medium">Mot de passe</label>
            <fa-icon [icon]="['fas','lock']" class="input-icon-left text-gray-400"></fa-icon>
            <input
              id="password"
              type="password"
              formControlName="password"
              placeholder="••••••••"
              class="form-control custom-form-control ps-5"
              required
            />
          </div>

          <!-- Bouton connexion -->
          <button type="submit" class="btn custom-btn btn-lg w-100 fw-semibold mb-4"
                  [disabled]="loading">
            <fa-icon [icon]="['fas','user']" class="me-2"></fa-icon>
            @if (loading) { Connexion en cours... } @else { Se connecter }
            <fa-icon [icon]="['fas','arrow-right']" class="ms-2"></fa-icon>
          </button>
        </form>

        <!-- Lien inscription -->
        <div class="text-center mb-3">
          <small class="text-light opacity-75">
            Pas encore de compte ?
            <a routerLink="/register" class="text-decoration-none text-primary fw-medium">Créer un compte</a>
          </small>
        </div>

        <!-- Sécurité -->
        <div class="d-flex items-center justify-center security-info">
          <fa-icon [icon]="['fas','shield-halved']" class="me-2"></fa-icon>
          <small class="text-white">Vos données sont sécurisées et chiffrées</small>
        </div>
      </div>
    </div>
  </div>
</div>
