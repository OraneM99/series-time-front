<div class="max-w-md mx-auto bg-container p-6 rounded-lg shadow">
  <h1 class="text-xl font-bold mb-4">Créer un compte</h1>

  <!-- Message d'erreur -->
  @if (errorMessage) {
    <div class="bg-red-600 text-white p-2 rounded mb-4">
      {{ errorMessage }}
    </div>
  }

  <!-- Message de succès -->
  @if (successMessage) {
    <div class="bg-green-600 text-white p-2 rounded mb-4">
      {{ successMessage }}
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="block text-sm">Nom d'utilisateur</label>
      <input formControlName="username" type="text"
             class="w-full px-3 py-2 border rounded bg-background text-text">
    </div>

    <div class="mb-3">
      <label class="block text-sm">Email</label>
      <input formControlName="email" type="email"
             class="w-full px-3 py-2 border rounded bg-background text-text">
    </div>

    <div class="mb-3">
      <label class="block text-sm">Mot de passe</label>
      <input formControlName="password" type="password"
             class="w-full px-3 py-2 border rounded bg-background text-text">
    </div>

    <div class="mb-3">
      <label class="block text-sm">Confirmer le mot de passe</label>
      <input formControlName="confirmPassword" type="password"
             class="w-full px-3 py-2 border rounded bg-background text-text">
    </div>

    <button type="submit"
            class="w-full py-2 bg-button text-white rounded font-semibold hover:opacity-90">
      Créer mon compte
    </button>
  </form>
</div>
